<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nexus Dashboard + User Management — Preview</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-void:#080a0f;--bg-surface:#0d1117;--bg-raised:#161b25;--bg-card:#1a2033;
  --border:#242d42;--border-bright:#2e3a55;
  --cyan:#00e5ff;--green:#39ff14;--amber:#ffb700;--red:#ff3860;--purple:#bf5af2;
  --text:#e8edf5;--text2:#7a8aa0;--muted:#3d4a5c;
  --display:"Syne",sans-serif;--mono:"DM Mono",monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg-void);color:var(--text);font-family:var(--mono);font-size:13px;line-height:1.6}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg-surface)}::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes up{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes inright{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Layout */
.shell{display:flex;height:100vh;width:100vw;overflow:hidden;position:relative;z-index:1}
.col{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.pg-content{flex:1;overflow-y:auto;background:var(--bg-void)}
.page{padding:28px;animation:up .3s ease}
.h{display:none}

/* Sidebar shared */
.sb{width:220px;min-width:220px;height:100%;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sb-logo{display:flex;align-items:center;gap:8px;padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.lm{width:32px;height:32px;background:var(--cyan);color:var(--bg-void);font-family:var(--display);font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:6px;box-shadow:0 0 20px rgba(0,229,255,.25)}
.lt{font-family:var(--display);font-weight:700;font-size:15px;letter-spacing:.12em}
.ltag{font-size:9px;color:var(--muted);margin-left:auto;background:var(--bg-raised);padding:2px 6px;border-radius:2px;border:1px solid var(--border)}
.sb-nav{flex:1;padding:20px 12px;overflow-y:auto}
.ns{font-size:9px;letter-spacing:.15em;color:var(--muted);display:block;padding:0 8px;margin-bottom:6px;margin-top:16px}
.ns:first-child{margin-top:0}
ul.nl{list-style:none}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:4px;cursor:pointer;color:var(--text2);transition:all .15s;margin-bottom:2px;border-left:2px solid transparent;font-family:var(--display);font-size:12px;font-weight:600}
.ni:hover{background:var(--bg-raised);color:var(--text)}
.ni.on{background:rgba(0,229,255,.08);color:var(--cyan);border-left-color:var(--cyan);padding-left:8px}
.ni.pu.on{background:rgba(191,90,242,.08);color:var(--purple);border-left-color:var(--purple)}
.ni.mod:hover{background:rgba(191,90,242,.08);color:var(--purple)}
.nicon{font-size:14px;width:18px;text-align:center}
.nlbl{flex:1}
.nbdg{margin-left:auto;background:rgba(255,56,96,.15);color:var(--red);border:1px solid rgba(255,56,96,.3);font-size:9px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.pu-nbdg{background:rgba(191,90,242,.15);color:var(--purple);border:1px solid rgba(191,90,242,.3)}
.sb-user{display:flex;align-items:center;gap:10px;padding:16px 18px;border-top:1px solid var(--border)}
.ua{width:32px;height:32px;border-radius:4px;background:linear-gradient(135deg,#1e3a5f,#0d2340);border:1px solid var(--border-bright);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;color:var(--cyan)}
.ui{flex:1}.un{font-size:12px;font-weight:600;color:var(--text)}.ur{font-size:10px;color:var(--muted)}
.udot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
.logout-b{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

/* Header */
.hdr{height:56px;background:var(--bg-surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:5}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;min-width:180px}
.bc-r{color:var(--muted)}.bc-s{color:var(--border-bright)}.bc-c{color:var(--cyan);font-weight:500;letter-spacing:.08em}
.hclk{font-size:11px;color:var(--muted);letter-spacing:.05em;border-left:1px solid var(--border);padding-left:16px}
.hm{flex:1;display:flex;justify-content:center}
.sbar{display:flex;align-items:center;gap:8px;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;padding:6px 12px;width:320px}
.si{color:var(--muted);font-size:16px}
.sinp{background:none;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:12px;flex:1}
.sinp::placeholder{color:var(--muted)}
.skbd{font-size:10px;color:var(--muted);background:var(--bg-card);border:1px solid var(--border);border-radius:3px;padding:1px 5px}
.hr{display:flex;align-items:center;gap:10px;min-width:180px;justify-content:flex-end}
.spill{display:flex;align-items:center;gap:6px;background:var(--bg-raised);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:9px;letter-spacing:.1em;color:var(--text2)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2.5s infinite}
.ib{position:relative;width:34px;height:34px;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.ib.al{border-color:rgba(255,183,0,.4);color:var(--amber)}
.nbc{position:absolute;top:-5px;right:-5px;background:var(--amber);color:var(--bg-void);font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* Stat cards */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.sc{background:var(--bg-card);border:1px solid var(--border);border-top:2px solid;border-radius:8px;padding:20px;cursor:pointer;transition:all .2s;animation:up .4s ease both}
.sc:hover{border-color:var(--border-bright);transform:translateY(-2px)}
.sc.cy{border-top-color:var(--cyan)}.sc.gr{border-top-color:var(--green)}.sc.am{border-top-color:var(--amber)}.sc.re{border-top-color:var(--red)}.sc.pu{border-top-color:var(--purple)}
.sch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.scic{font-size:18px}.sc.cy .scic{color:var(--cyan)}.sc.gr .scic{color:var(--green)}.sc.am .scic{color:var(--amber)}.sc.re .scic{color:var(--red)}.sc.pu .scic{color:var(--purple)}
.sct{font-size:10px;font-weight:500;background:var(--bg-raised);border:1px solid var(--border);padding:2px 7px;border-radius:2px;color:var(--muted)}
.tup{color:var(--green)!important;border-color:rgba(57,255,20,.2)!important;background:rgba(57,255,20,.05)!important}
.tdn{color:var(--red)!important;border-color:rgba(255,56,96,.2)!important;background:rgba(255,56,96,.05)!important}
.scv{font-family:var(--display);font-size:36px;font-weight:800;line-height:1;color:var(--text)}
.scu{font-size:14px;color:var(--text2)}
.scl{font-size:9px;letter-spacing:.14em;color:var(--muted);margin:4px 0 16px}
.sc-bar{height:3px;background:var(--bg-raised);border-radius:2px;overflow:hidden}
.sc-bf{height:100%;border-radius:2px;background:var(--cyan)}
.scdots{display:flex;gap:4px}
.dot{width:8px;height:8px;border-radius:2px;background:var(--bg-raised);border:1px solid var(--border)}
.dot.on{background:var(--green);border-color:var(--green)}

/* Task cards */
.wb{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.wt{font-family:var(--display);font-size:22px;font-weight:700}.acc{color:var(--cyan)}
.ws{font-size:11px;color:var(--muted);margin-top:4px}
.add-b{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.3);color:var(--cyan);font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.08em;padding:8px 16px;border-radius:4px;cursor:pointer}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--text2)}
.fts{display:flex;gap:4px}
.ft{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:4px 10px;border-radius:4px;cursor:pointer}
.ft.on{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.3);color:var(--cyan)}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.tc{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px;transition:all .2s;animation:up .3s ease both;border-left:3px solid transparent}
.tc:hover{border-color:var(--border-bright);transform:translateY(-1px)}
.tc.ip{border-left-color:var(--cyan)}.tc.dn{border-left-color:var(--green)}.tc.bk{border-left-color:var(--red)}.tc.td{border-left-color:var(--border-bright)}
.tch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tid{font-size:10px;color:var(--muted)}
.bg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;border:1px solid}
.b-cy{background:rgba(0,229,255,.12);color:var(--cyan);border-color:rgba(0,229,255,.25)}
.b-am{background:rgba(255,183,0,.1);color:var(--amber);border-color:rgba(255,183,0,.2)}
.b-re{background:rgba(255,56,96,.1);color:var(--red);border-color:rgba(255,56,96,.2)}
.tctt{font-family:var(--display);font-size:13px;font-weight:700;margin-bottom:8px;line-height:1.4;color:var(--text)}
.tcta{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.tag{font-size:9px;color:var(--muted);background:var(--bg-raised);border:1px solid var(--border);padding:1px 6px;border-radius:2px}
.tcpr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.pb{flex:1;height:3px;background:var(--bg-raised);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px}.pf.ip{background:var(--cyan)}.pf.dn{background:var(--green)}.pf.bk{background:var(--red)}
.pp{font-size:10px;color:var(--muted);min-width:28px;text-align:right}
.tcf{display:flex;align-items:center;justify-content:space-between}
.tm{display:flex;align-items:center;gap:8px}
.aav{width:22px;height:22px;border-radius:4px;background:var(--bg-raised);border:1px solid var(--border-bright);color:var(--cyan);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.td-lbl{font-size:10px;color:var(--muted)}.td-lbl.od{color:var(--red)}
.ssb{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:600;letter-spacing:.08em;padding:3px 8px;border-radius:2px;cursor:pointer;border:1px solid var(--border);background:var(--bg-raised);color:var(--muted)}
.ssb.ip{color:var(--cyan);border-color:rgba(0,229,255,.25);background:rgba(0,229,255,.06)}
.ssb.dn{color:var(--green);border-color:rgba(57,255,20,.2);background:rgba(57,255,20,.05)}
.ssb.bk{color:var(--red);border-color:rgba(255,56,96,.2);background:rgba(255,56,96,.06)}
.xd{width:5px;height:5px;border-radius:50%;background:currentColor}

/* Notification panel */
.nov{position:fixed;inset:0;background:rgba(8,10,15,.6);backdrop-filter:blur(4px);z-index:100;display:none;justify-content:flex-end}
.nov.op{display:flex}
.np{width:360px;height:100%;background:var(--bg-surface);border-left:1px solid var(--border);display:flex;flex-direction:column;animation:inright .25s ease}
.nph{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border)}
.npt{display:flex;align-items:center;gap:10px;font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:.1em}
.upill{background:rgba(255,183,0,.12);color:var(--amber);border:1px solid rgba(255,183,0,.25);font-size:9px;padding:2px 7px;border-radius:10px}
.mar-all{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:4px;cursor:pointer}
.cx{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.nl2{flex:1;overflow-y:auto;padding:8px}
.nitem{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:4px;cursor:pointer;margin-bottom:2px;border:1px solid transparent}
.nitem.ur{background:var(--bg-card);border-color:var(--border)}
.nico{width:30px;height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.nico.er{background:rgba(255,56,96,.12);color:var(--red)}.nico.wa{background:rgba(255,183,0,.1);color:var(--amber)}.nico.ok{background:rgba(57,255,20,.08);color:var(--green)}.nico.in{background:rgba(0,229,255,.08);color:var(--cyan)}
.nb{flex:1;min-width:0}
.nt{font-size:12px;font-weight:600;margin-bottom:3px}
.nm{font-size:11px;color:var(--text2);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ntime{font-size:10px;color:var(--muted)}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--cyan);flex-shrink:0;margin-top:4px}
.npf{padding:12px 20px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);text-align:center}

/* Role/status badges */
.rb{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid}
.rbd{width:5px;height:5px;border-radius:50%;background:currentColor}
.r-admin{color:#ff3860;background:rgba(255,56,96,.1);border-color:rgba(255,56,96,.25)}
.r-developer{color:#00e5ff;background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.2)}
.r-designer{color:#bf5af2;background:rgba(191,90,242,.1);border-color:rgba(191,90,242,.25)}
.r-manager{color:#ffb700;background:rgba(255,183,0,.1);border-color:rgba(255,183,0,.25)}
.r-viewer{color:#7a8aa0;background:rgba(122,138,160,.1);border-color:rgba(122,138,160,.2)}
.s-active{color:#39ff14;background:rgba(57,255,20,.08);border-color:rgba(57,255,20,.2)}
.s-inactive{color:#7a8aa0;background:rgba(122,138,160,.1);border-color:rgba(122,138,160,.2)}
.s-pending{color:#ffb700;background:rgba(255,183,0,.1);border-color:rgba(255,183,0,.25)}
.s-suspended{color:#ff3860;background:rgba(255,56,96,.1);border-color:rgba(255,56,96,.25)}

/* Page header */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.pt{font-family:var(--display);font-size:24px;font-weight:800;color:var(--text)}
.ps{font-size:12px;color:var(--muted);margin-top:4px}
.cta{background:var(--purple);border:none;color:#fff;font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.1em;padding:9px 16px;border-radius:4px;cursor:pointer;transition:all .2s}
.cta:hover{background:#d070ff;box-shadow:0 0 16px rgba(191,90,242,.4)}
.cta-outline{background:none;border:1px solid var(--purple);color:var(--purple);font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.1em;padding:8px 16px;border-radius:4px;cursor:pointer}
.btn-sec{background:var(--bg-raised);border:1px solid var(--border);color:var(--text2);font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.1em;padding:9px 18px;border-radius:4px;cursor:pointer}

/* User cards */
.uc{display:flex;align-items:center;gap:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px;transition:all .2s;animation:up .3s ease both}
.uc:hover{border-color:var(--border-bright);transform:translateY(-1px)}
.ucav{position:relative;width:44px;height:44px;min-width:44px;border-radius:8px;background:var(--bg-raised);border:1.5px solid;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:14px}
.ucst{position:absolute;bottom:-3px;right:-3px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg-card)}
.ucst.active{background:var(--green)}.ucst.inactive{background:var(--muted)}.ucst.pending{background:var(--amber)}.ucst.suspended{background:var(--red)}
.uci{flex:1;min-width:0}
.ucn{font-family:var(--display);font-size:13px;font-weight:700;color:var(--text)}
.uce{font-size:11px;color:var(--muted);margin-top:2px}
.ucm{display:flex;align-items:center;gap:5px;margin-top:4px;font-size:10px;color:var(--text2)}
.ucb{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.ucstats{display:flex;gap:12px;padding:0 12px;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.ucst2{display:flex;flex-direction:column;align-items:center;gap:2px}
.ucstv{font-family:var(--display);font-size:16px;font-weight:700;color:var(--text)}
.ucstl{font-size:9px;letter-spacing:.08em;color:var(--muted)}
.ucact{display:flex;gap:4px}
.ubtn{width:28px;height:28px;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ubtn:hover{border-color:var(--border-bright);color:var(--text)}
.ubtn.d:hover{border-color:rgba(255,56,96,.4);color:var(--red)}

/* UD Stats */
.udsg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.uds{background:var(--bg-card);border:1px solid var(--border);border-top:2px solid;border-radius:8px;padding:18px 20px;animation:up .3s ease both}
.uds-pu{border-top-color:var(--purple)}.uds-gr{border-top-color:var(--green)}.uds-am{border-top-color:var(--amber)}.uds-re{border-top-color:var(--red)}
.udsi{font-size:20px;margin-bottom:10px}
.uds-pu .udsi{color:var(--purple)}.uds-gr .udsi{color:var(--green)}.uds-am .udsi{color:var(--amber)}.uds-re .udsi{color:var(--red)}
.udsv{font-family:var(--display);font-size:36px;font-weight:800;color:var(--text);line-height:1;margin-bottom:4px}
.udsl{font-size:9px;letter-spacing:.12em;color:var(--muted)}

/* Panels */
.udg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px}
.panh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.pant{font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--text2)}
.panl{font-size:10px;color:var(--purple);cursor:pointer}

/* Profile */
.p-hero{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:1px solid var(--border);border-left:4px solid;border-radius:8px;padding:24px 28px;margin-bottom:16px;gap:20px}
.phl{display:flex;align-items:center;gap:20px}
.phav{width:64px;height:64px;min-width:64px;border-radius:8px;background:var(--bg-raised);border:2px solid;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:22px;position:relative}
.phst{position:absolute;bottom:-4px;right:-4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--bg-card)}
.phst.active{background:var(--green);box-shadow:0 0 6px var(--green)}.phst.inactive{background:var(--muted)}.phst.pending{background:var(--amber)}.phst.suspended{background:var(--red)}

      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="ppanel">
        <div class="sectl">TASK PERFORMANCE</div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px">
          <span style="color:var(--green);font-weight:600">${u.tc} done</span><span style="color:var(--muted)">${u.ta} assigned</span>
        </div>
        <div style="height:6px;background:var(--bg-raised);border-radius:3px;overflow:hidden;margin-bottom:8px">
          <div style="height:100%;width:${rate}%;background:${u.ac};border-radius:3px"></div>
        </div>
        <div style="font-size:11px;color:var(--muted);text-align:right">${rate}% completion rate</div>
      </div>
      <div class="ppanel">
        <div class="sectl">STATUS CONTROL</div>
        <p style="font-size:11px;color:var(--muted);margin-bottom:12px">Change account status. Actions are immediate.</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          ${sts.map(s=>`<button onclick="updSt('${u.id}','${s.v}')" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:4px;font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:.06em;cursor:pointer;border:1px solid ${u.status===s.v?"rgba(191,90,242,.3)":"var(--border)"};background:${u.status===s.v?"rgba(191,90,242,.1)":"var(--bg-raised)"};color:${u.status===s.v?"var(--purple)":"var(--muted)"}">${s.i} ${s.l.toUpperCase()}</button>`).join("")}
        </div>
      </div>
      <div class="ppanel" style="border-color:rgba(255,56,96,.25);background:rgba(255,56,96,.03)">
        <div class="sectl" style="color:rgba(255,56,96,.7)">DANGER ZONE</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:16px">
          <div><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px">Delete account</div><div style="font-size:11px;color:var(--muted)">Permanently remove user.</div></div>
          <button onclick="S.deleteTgt='${u.id}';$('del-modal').classList.add('op')" style="background:rgba(255,56,96,.1);border:1px solid rgba(255,56,96,.3);color:var(--red);font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.08em;padding:8px 16px;border-radius:4px;cursor:pointer;white-space:nowrap">DELETE</button>
        </div>
      </div>
    </div>
  </div>
</div>`;
}
function updSt(id,st){const u=users.find(x=>x.id===id);if(u){u.status=st;go("user-profile",{profileId:id});}}

// User Form
function ufHTML(){
  const isE=S.page==="user-edit";
  const u=isE?users.find(x=>x.id===S.editId):null;
  if(isE&&u&&!S._formLoaded){
    Object.assign(S.fd,{fn:u.fn,ln:u.ln,email:u.email,phone:u.phone,dept:u.dept,loc:u.loc,bio:u.bio,role:u.role,perms:[...u.perms]});
    S._formLoaded=true;
  } else if(!isE){ S.fd={fn:"",ln:"",email:"",phone:"",dept:"",loc:"",bio:"",role:"",perms:["read"],pw:"",cpw:""}; S._formLoaded=false; }
  const depts=["Engineering","Design","Data","Security","Frontend","Infrastructure","Product","Legal","DevOps","Marketing"];
  const roles=[{v:"admin",i:"◈",d:"Full system access"},{v:"manager",i:"⊞",d:"Team oversight"},{v:"developer",i:"◫",d:"Code & infra"},{v:"designer",i:"◎",d:"UI/UX & assets"},{v:"viewer",i:"⊙",d:"Read-only"}];
  const perms=[{v:"read",l:"Read",d:"View all content"},{v:"write",l:"Write",d:"Create & edit"},{v:"delete",l:"Delete",d:"Remove records"},{v:"admin",l:"Admin",d:"Manage users"}];
  const checks=[
    {l:"Name provided",ok:!!(S.fd.fn&&S.fd.ln)},
    {l:"Valid email address",ok:!!(S.fd.email&&/\S+@\S+/.test(S.fd.email))},
    {l:"Department selected",ok:!!S.fd.dept},
    {l:"Role assigned",ok:!!S.fd.role},
    {l:"Password secure",ok:isE||S.pwStr>=3},
  ];
  return`<div class="page">
  <div class="ph">
    <div><h1 class="pt">${isE?"Edit User":"Create User"}</h1><p class="ps">${isE?`Update details for ${u?u.fn+" "+u.ln:"user"}`:"Register a new team member."}</p></div>
    <div style="display:flex;gap:10px">
      <button class="btn-sec" onclick="go(${isE?`'user-profile',{profileId:S.editId}`:"'user-list'"})">CANCEL</button>
      <button class="cta" id="fsub">${isE?"✓ SAVE CHANGES":"+ CREATE USER"}</button>
    </div>
  </div>
  <div id="fban" class="banner" style="display:none"></div>
  <div class="fl2">
    <div class="fcol">
      <div class="fcard">
        <div class="fcard-t">PERSONAL INFORMATION</div>
        <div class="frow">
          <div class="fg"><label class="fl">FIRST NAME <span class="req">*</span></label><input id="fn" type="text" class="fi" value="${S.fd.fn}" placeholder="Andrés"><span id="en" class="ferr" style="display:none">Required</span></div>
          <div class="fg"><label class="fl">LAST NAME <span class="req">*</span></label><input id="fl" type="text" class="fi" value="${S.fd.ln}" placeholder="Reyes"><span id="el" class="ferr" style="display:none">Required</span></div>
        </div>
        <div class="fg"><label class="fl">EMAIL <span class="req">*</span></label><input id="fe" type="email" class="fi" value="${S.fd.email}" placeholder="user@nexus.io"><span id="ee" class="ferr" style="display:none">Valid email required</span></div>
        <div class="fg"><label class="fl">PHONE</label><input id="fp" type="tel" class="fi" value="${S.fd.phone}" placeholder="+1 555 000 1234"><span id="ep" class="ferr" style="display:none">Invalid format</span></div>
        <div class="frow">
          <div class="fg"><label class="fl">DEPARTMENT <span class="req">*</span></label>
            <select id="fd" class="fi fsel"><option value="">Select...</option>${depts.map(d=>`<option value="${d}"${S.fd.dept===d?" selected":""}>${d}</option>`).join("")}</select>
            <span id="ed" class="ferr" style="display:none">Required</span></div>
          <div class="fg"><label class="fl">LOCATION</label><input id="fl2" type="text" class="fi" value="${S.fd.loc}" placeholder="City, Country"></div>
        </div>
        <div class="fg"><label class="fl">BIO</label><textarea id="fb" class="fi fta" placeholder="Short bio...">${S.fd.bio}</textarea></div>
      </div>
      ${!isE?`<div class="fcard">
        <div class="fcard-t">SECURITY</div>
        <div class="fg"><label class="fl">PASSWORD <span class="req">*</span></label>
          <input id="fpw" type="password" class="fi" placeholder="Min 8 chars, 1 uppercase, 1 digit">
          <div class="sbar2" id="sm" style="display:none"><div class="sbars" id="sbrs"><span class="sbarx"></span><span class="sbarx"></span><span class="sbarx"></span><span class="sbarx"></span></div><span class="slbl" id="slbl"></span></div>
          <span id="epw" class="ferr" style="display:none">Min 8 chars, uppercase & digit required</span></div>
        <div class="fg"><label class="fl">CONFIRM PASSWORD <span class="req">*</span></label><input id="fcpw" type="password" class="fi" placeholder="Repeat password"><span id="ecpw" class="ferr" style="display:none">Passwords do not match</span></div>
      </div>`:""}
    </div>
    <div class="fcol">
      <div class="fcard">
        <div class="fcard-t">ROLE & ACCESS</div>
        ${roles.map(r=>`<button type="button" class="role-opt${S.fd.role===r.v?" sel":""}" id="ro-${r.v}" onclick="selRole('${r.v}')">
          <span class="roi">${r.i}</span><span class="ron">${r.v}</span><span class="rod">${r.d}</span></button>`).join("")}
        <span id="er" class="ferr" style="display:none;margin-top:4px">Please select a role</span>
        ${S.fd.role?`<div style="display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><span style="font-size:9px;color:var(--muted);letter-spacing:.1em">PREVIEW:</span>${rb(S.fd.role)}</div>`:""}
      </div>
      <div class="fcard">
        <div class="fcard-t">PERMISSIONS</div>
        ${perms.map(p=>`<div class="perm-item${S.fd.perms.includes(p.v)?" on":""}" id="pi-${p.v}" onclick="${p.v!=="read"?`togPerm('${p.v}')`:""}" style="${p.v==="read"?"opacity:.7;cursor:default":"cursor:pointer"}">
          <span class="pi-chk">${S.fd.perms.includes(p.v)?"✓":"○"}</span>
          <div><div class="pin">${p.l}</div><div class="pid">${p.d}</div></div>
        </div>`).join("")}
      </div>
      <div class="fcard" style="background:var(--bg-raised);border-style:dashed">
        <div class="fcard-t">FORM STATUS</div>
        ${checks.map(c=>`<div class="sum-item${c.ok?" ok":""}"><span>${c.ok?"✓":"○"}</span><span>${c.l}</span></div>`).join("")}
      </div>
    </div>
  </div>
</div>`;
}
function selRole(r){
  S.fd.role=r;
  document.querySelectorAll(".role-opt").forEach(b=>{b.classList.toggle("sel",b.id===`ro-${r}`);b.querySelector(".roi").style.color=b.id===`ro-${r}`?"var(--purple)":"var(--muted)";});
}
function togPerm(p){const i=S.fd.perms.indexOf(p);i===-1?S.fd.perms.push(p):S.fd.perms.splice(i,1);const el2=document.getElementById(`pi-${p}`);if(el2){el2.classList.toggle("on",S.fd.perms.includes(p));el2.querySelector(".pi-chk").textContent=S.fd.perms.includes(p)?"✓":"○";}}
function wireUF(){
  $("fsub").onclick=submitF;
  const pw=$("fpw");
  if(pw)pw.oninput=e=>{
    const v=e.target.value;let s=0;
    if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/\d/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
    S.pwStr=s;const sm=$("sm");if(sm)sm.style.display=v?"flex":"none";
    const bars=document.querySelectorAll("#sbrs .sbarx"),cls=["","wk","fr","gd","st"];
    bars.forEach((b,i)=>{b.className="sbarx";if(i<s)b.classList.add(cls[s]);});
    const sl=$("slbl");if(sl){sl.textContent=["","Weak","Fair","Good","Strong"][s];sl.style.color=["","var(--red)","var(--amber)","var(--cyan)","var(--green)"][s];}
  };
}
function submitF(){
  const isE=S.page==="user-edit";
  const fn=$("fn")?.value.trim(),ln=$("fl")?.value.trim(),em=$("fe")?.value.trim(),ph=$("fp")?.value.trim(),dept=$("fd")?.value,loc=$("fl2")?.value.trim(),bio=$("fb")?.value.trim(),pw=$("fpw")?.value,cpw=$("fcpw")?.value;
  let ok=true;
  const sh=(id,show,msg)=>{const e=$(id);if(e){if(msg)e.textContent=msg;e.style.display=show?"":"none";}if(show)ok=false;};
  const mi=(id,err)=>{const i=$(id);if(i)i.style.borderColor=err?"rgba(255,56,96,.5)":"";};
  sh("en",!fn);mi("fn",!fn);sh("el",!ln);mi("fl",!ln);
  sh("ee",!em||!/\S+@\S+/.test(em));mi("fe",!em||!/\S+@\S+/.test(em));
  sh("ep",!!(ph&&!/^[\+]?[\d\s\-\(\)]{7,15}$/.test(ph)));
  sh("ed",!dept);mi("fd",!dept);
  sh("er",!S.fd.role);
  if(!isE){sh("epw",!pw||pw.length<8||!/[A-Z]/.test(pw)||!/\d/.test(pw));mi("fpw",!pw||pw.length<8);sh("ecpw",pw!==cpw);mi("fcpw",pw!==cpw);}
  const ban=$("fban");
  if(!ok){if(ban){ban.className="banner ban-er";ban.textContent="⊘ Please fix the errors above.";ban.style.display="";}return;}
  $("fsub").textContent="SAVING...";$("fsub").disabled=true;
  setTimeout(()=>{
    if(isE){const u=users.find(x=>x.id===S.editId);if(u)Object.assign(u,{fn,ln,email:em,phone:ph,dept,loc,bio,role:S.fd.role,perms:S.fd.perms,av:((fn[0]||"")+(ln[0]||"")).toUpperCase()});}
    else{const nu={id:"u"+Date.now(),fn,ln,email:em,phone:ph,dept,loc,bio,role:S.fd.role,status:"pending",av:((fn[0]||"")+(ln[0]||"")).toUpperCase(),ac:["#00e5ff","#39ff14","#ffb700","#bf5af2","#ff3860"][~~(Math.random()*5)],joined:new Date().toISOString().split("T")[0],last:new Date().toISOString().split("T")[0],ta:0,tc:0,perms:S.fd.perms};users.unshift(nu);S.editId=nu.id;S.page="user-edit";}
    S._formLoaded=false;
    if(ban){ban.className="banner ban-ok";ban.textContent=isE?`✓ ${fn} ${ln} updated!`:`✓ ${fn} ${ln} created!`;ban.style.display="";}
    setTimeout(()=>go("user-profile",{profileId:S.editId}),900);
  },700);
}

// ====================================================
// BOOT
// ====================================================
render();
</script>
</body>
</html>
